version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: block3rchain_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=block3rchain
    ports:
      - "5433:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
